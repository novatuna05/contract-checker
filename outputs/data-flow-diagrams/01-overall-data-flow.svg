<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#8a94a6" />
      </marker>
      <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1f2933" flood-opacity="0.12"/>
      </filter>
    </defs>
  <style>
    @font-face { font-family: InterFallback; src: local("Arial"); }
    .title { font: 700 34px InterFallback, Arial, sans-serif; fill: #1f2933; }
    .subtitle { font: 400 17px InterFallback, Arial, sans-serif; fill: #5d6875; }
    .label { font: 700 17px InterFallback, Arial, sans-serif; fill: #1f2933; }
    .sub { font: 400 13px InterFallback, Arial, sans-serif; fill: #5d6875; }
    .edge { font: 600 13px InterFallback, Arial, sans-serif; fill: #5d6875; paint-order: stroke; stroke: #f7f4ef; stroke-width: 5px; }
    .band { font: 800 13px InterFallback, Arial, sans-serif; letter-spacing: 1.2px; fill: #ffffff; }
  </style>
  <rect width="100%" height="100%" fill="#f7f4ef"/>
  <text x="64" y="62" class="title">푸드코스트 전체 데이터 흐름도</text>
  <text x="64" y="92" class="subtitle">사용자 화면에서 Next.js API, 인증, Prisma, SQLite까지 이어지는 핵심 흐름</text>
  
        <rect x="64" y="132" width="280" height="38" rx="6" fill="#2f80ed"/><text x="204" y="156" text-anchor="middle" class="band">CLIENT</text>
        <rect x="430" y="132" width="460" height="38" rx="6" fill="#0f766e"/><text x="660" y="156" text-anchor="middle" class="band">NEXT.JS SERVER</text>
        <rect x="980" y="132" width="330" height="38" rx="6" fill="#7c3aed"/><text x="1145" y="156" text-anchor="middle" class="band">DATA / EXTERNAL</text>
        
    <g id="user" filter="url(#shadow)">
      <rect x="92" y="220" width="220" height="82" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="202" y="246">사용자</tspan></text>
      <text x="202" y="284" text-anchor="middle" class="sub">업로드, 입력, 조회</text>
    </g>
        
    <g id="pages" filter="url(#shadow)">
      <rect x="92" y="380" width="220" height="98" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="202" y="406">대시보드 UI</tspan></text>
      <text x="202" y="460" text-anchor="middle" class="sub">React pages + forms</text>
    </g>
        
    <g id="auth" filter="url(#shadow)">
      <rect x="470" y="220" width="190" height="82" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="565" y="246">NextAuth</tspan></text>
      <text x="565" y="284" text-anchor="middle" class="sub">세션/권한 확인</text>
    </g>
        
    <g id="api" filter="url(#shadow)">
      <rect x="520" y="380" width="260" height="98" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="650" y="406">API Route</tspan><tspan x="650" y="424">Handlers</tspan></text>
      <text x="650" y="460" text-anchor="middle" class="sub">/api/* 요청 처리</text>
    </g>
        
    <g id="logic" filter="url(#shadow)">
      <rect x="520" y="570" width="260" height="98" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="650" y="596">비즈니스 로직</tspan></text>
      <text x="650" y="650" text-anchor="middle" class="sub">검증, 단위 변환, 계산</text>
    </g>
        
    <g id="db" filter="url(#shadow)">
      <path d="M1010,367 C1010,351 1260,351 1260,367 L1260,461 C1260,477 1010,477 1010,461 Z" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
      <path d="M1010,367 C1010,383 1260,383 1260,367" fill="none" stroke="#7c3aed" stroke-width="2"/>
      <text x="1135" y="399" text-anchor="middle" class="label">SQLite DB</text>
      <text x="1135" y="421" text-anchor="middle" class="sub">Prisma schema</text>
    </g>
        
    <g id="ai" filter="url(#shadow)">
      <rect x="1010" y="560" width="250" height="96" rx="8" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="1135" y="586">OpenAI / Textract</tspan></text>
      <text x="1135" y="638" text-anchor="middle" class="sub">영수증/CSV 분석</text>
    </g>
        
    <path d="M202,302 L202,380" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="202" y="333" text-anchor="middle" class="edge">화면 조작</text>
        
    <path d="M312,429 L520,429" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="416" y="421" text-anchor="middle" class="edge">fetch</text>
        
    <path d="M650,380 L570,302" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="610" y="333" text-anchor="middle" class="edge">getCurrentUser</text>
        
    <path d="M660,302 L660,380" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="660" y="333" text-anchor="middle" class="edge">세션 결과</text>
        
    <path d="M780,429 L1010,414" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="895" y="413.5" text-anchor="middle" class="edge">Prisma CRUD</text>
        
    <path d="M650,478 L650,570" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="650" y="516" text-anchor="middle" class="edge">계산/정규화</text>
        
    <path d="M780,620 L1010,608" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="895" y="606" text-anchor="middle" class="edge">파일 분석</text>
        
    <path d="M1010,440 L780,440" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="895" y="432" text-anchor="middle" class="edge">조회/저장 결과</text>
        
    <path d="M520,628 L312,452" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="416" y="532" text-anchor="middle" class="edge">JSON 응답</text>
      
</svg>