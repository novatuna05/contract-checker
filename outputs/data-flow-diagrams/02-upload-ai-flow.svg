<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#8a94a6" />
      </marker>
      <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1f2933" flood-opacity="0.12"/>
      </filter>
    </defs>
  <style>
    @font-face { font-family: InterFallback; src: local("Arial"); }
    .title { font: 700 34px InterFallback, Arial, sans-serif; fill: #1f2933; }
    .subtitle { font: 400 17px InterFallback, Arial, sans-serif; fill: #5d6875; }
    .label { font: 700 17px InterFallback, Arial, sans-serif; fill: #1f2933; }
    .sub { font: 400 13px InterFallback, Arial, sans-serif; fill: #5d6875; }
    .edge { font: 600 13px InterFallback, Arial, sans-serif; fill: #5d6875; paint-order: stroke; stroke: #f7f4ef; stroke-width: 5px; }
    .band { font: 800 13px InterFallback, Arial, sans-serif; letter-spacing: 1.2px; fill: #ffffff; }
  </style>
  <rect width="100%" height="100%" fill="#f7f4ef"/>
  <text x="64" y="62" class="title">영수증 및 CSV 업로드 데이터 흐름도</text>
  <text x="64" y="92" class="subtitle">파일 업로드 후 AI 분석 결과를 검토하고 재료 DB에 upsert하는 흐름</text>
  
        
    <g id="upload" filter="url(#shadow)">
      <rect x="70" y="210" width="230" height="90" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="185" y="236">UploadModal</tspan></text>
      <text x="185" y="282" text-anchor="middle" class="sub">이미지 또는 CSV 선택</text>
    </g>
        
    <g id="uploadApi" filter="url(#shadow)">
      <rect x="380" y="210" width="260" height="90" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="510" y="236">POST</tspan><tspan x="510" y="254">/api/ingredients/upload</tspan></text>
      <text x="510" y="282" text-anchor="middle" class="sub">파일 타입/크기 검증</text>
    </g>
        
    <g id="branch" filter="url(#shadow)">
      <rect x="730" y="210" width="230" height="90" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="845" y="236">분석 분기</tspan></text>
      <text x="845" y="282" text-anchor="middle" class="sub">CSV vs 이미지</text>
    </g>
        
    <g id="csv" filter="url(#shadow)">
      <rect x="1080" y="125" width="240" height="88" rx="8" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="1200" y="151">analyzeCsvText</tspan></text>
      <text x="1200" y="195" text-anchor="middle" class="sub">gpt-4o-mini</text>
    </g>
        
    <g id="image" filter="url(#shadow)">
      <rect x="1080" y="305" width="240" height="96" rx="8" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="1200" y="331">analyzeReceiptImage</tspan></text>
      <text x="1200" y="383" text-anchor="middle" class="sub">Sharp tiles + Vision</text>
    </g>
        
    <g id="textract" filter="url(#shadow)">
      <rect x="820" y="470" width="240" height="84" rx="8" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="940" y="496">AWS Textract</tspan></text>
      <text x="940" y="536" text-anchor="middle" class="sub">OCR 보조 텍스트</text>
    </g>
        
    <g id="parsed" filter="url(#shadow)">
      <rect x="730" y="630" width="250" height="92" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="855" y="656">ParsedIngredient[]</tspan></text>
      <text x="855" y="704" text-anchor="middle" class="sub">name, unit, price, category</text>
    </g>
        
    <g id="review" filter="url(#shadow)">
      <rect x="390" y="630" width="250" height="92" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="515" y="656">사용자 검토</tspan></text>
      <text x="515" y="704" text-anchor="middle" class="sub">수정 후 저장</text>
    </g>
        
    <g id="upsert" filter="url(#shadow)">
      <rect x="90" y="630" width="230" height="92" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
      <text text-anchor="middle" class="label"><tspan x="205" y="656">POST</tspan><tspan x="205" y="674">/api/ingredients/upsert</tspan></text>
      <text x="205" y="704" text-anchor="middle" class="sub">생성/수정/변경 없음</text>
    </g>
        
    <g id="ingredient" filter="url(#shadow)">
      <path d="M90,442 C90,426 320,426 320,442 L320,530 C320,546 90,546 90,530 Z" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
      <path d="M90,442 C90,458 320,458 320,442" fill="none" stroke="#7c3aed" stroke-width="2"/>
      <text x="205" y="474" text-anchor="middle" class="label">Ingredient</text>
      <text x="205" y="496" text-anchor="middle" class="sub">현재 단가</text>
    </g>
        
    <g id="history" filter="url(#shadow)">
      <path d="M390,442 C390,426 640,426 640,442 L640,530 C640,546 390,546 390,530 Z" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
      <path d="M390,442 C390,458 640,458 640,442" fill="none" stroke="#7c3aed" stroke-width="2"/>
      <text x="515" y="474" text-anchor="middle" class="label">PriceHistory</text>
      <text x="515" y="496" text-anchor="middle" class="sub">단가 변경 이력</text>
    </g>
        
    <path d="M300,255 L380,255" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="340" y="247" text-anchor="middle" class="edge">multipart/form-data</text>
        
    <path d="M640,255 L730,255" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="685" y="247" text-anchor="middle" class="edge">파일 내용</text>
        
    <path d="M960,238 L1080,176" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="1020" y="199" text-anchor="middle" class="edge">CSV</text>
        
    <path d="M960,272 L1080,352" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="1020" y="304" text-anchor="middle" class="edge">이미지</text>
        
    <path d="M1080,352 C1000,390 1000,455 1060,512" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="1070" y="424" text-anchor="middle" class="edge">OCR 보조</text>
        
    <path d="M1200,213 C1205,520 1040,600 980,660" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="1090" y="413.5" text-anchor="middle" class="edge">JSON 추출</text>
        
    <path d="M1200,401 C1195,560 1050,650 980,676" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="1090" y="530.5" text-anchor="middle" class="edge">JSON 추출</text>
        
    <path d="M730,676 L640,676" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="685" y="668" text-anchor="middle" class="edge">분석 결과</text>
        
    <path d="M390,676 L320,676" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="355" y="668" text-anchor="middle" class="edge">저장</text>
        
    <path d="M205,630 L205,542" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="205" y="578" text-anchor="middle" class="edge">upsert</text>
        
    <path d="M320,676 C350,590 360,548 390,506" fill="none" stroke="#8a94a6" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="355" y="601" text-anchor="middle" class="edge">가격 변경 시</text>
      
</svg>